version: '3.8'
services:
  app:
    build: .
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
  db:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis
volumes:
  db-data: