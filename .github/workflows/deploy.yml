name: Deploy to Render
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Render
        uses: renderinc/render-github-actions@v2
        with:
          render-token: ${{ secrets.RENDER_TOKEN }}
      - name: Deploy to Render
        run: |
          render init
          render deploy
          render deploy --service movies-app --env main